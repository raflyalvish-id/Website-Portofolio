<!DOCTYPE html>
<html>
<head>
    <title>Alvi - Data Analyst</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        header {
            text-align: center;
            padding: 50px;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .project {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .project:hover {
            transform: scale(1.05);
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }

        footer {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Alvi</h1>
    <p>Aspiring Data Analyst</p>
</header>

<section class="projects">

    <div class="project">
        <h3>E-commerce Churn Analysis</h3>
        <p>Analyze customer churn using SQL & Power BI</p>
        <a href="#">View Project</a>
    </div>

    <div class="project">
        <h3>Sales Dashboard</h3>
        <p>Interactive Power BI dashboard</p>
        <a href="#">View Project</a>
    </div>

</section>

<footer>
    <p>Contact: your@email.com</p>
</footer>

</body>
</html>
